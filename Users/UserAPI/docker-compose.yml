  postgres:
    image: postgres:16-alpine
    container_name: personalservices-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=sa
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=PersonalServicesDb
    volumes:
      - postgres_data:/var/lib/postgresql/data

